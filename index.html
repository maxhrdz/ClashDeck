<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta
      name="description"
      content="Analyze Clash Royale decks and discover their strengths and weaknesses."
    >
    <title>Royale Deck Analyzer</title>
    <link rel="stylesheet" href="css/styles.css">
  </head>
  <body>
    <header>
      <h1>Royale Deck Analyzer</h1>
      <p>Build an 8-card deck and analyze its strengths.</p>
    </header>

    <main>
      <section id="card-catalog">
        <h2>Card Catalog</h2>
        <p>Available cards will appear here.</p>
      </section>

      <section id="selected-deck">
        <h2>Selected Deck</h2>
        <p>The cards you add to your deck will appear here.</p>
      </section>

      <section id="deck-analysis">
        <h2>Deck Analysis</h2>
        <p>Deck statistics and recommendations will appear here.</p>
      </section>
    </main>

    <script src="js/cards.js"></script>
    <script src="js/app.js"></script>
  </body>
</html>
